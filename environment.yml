name: moss
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - python>=3.9
  - numpy>=1.24.0
  - scipy>=1.10.0
  - pillow>=9.0.0
  - matplotlib>=3.7.0
  - tqdm>=4.65.0
  - psutil>=5.9.0
  - scikit-image>=0.20.0
  - tifffile>=2023.1.0
  - pip
  # PyTorch - conda will select appropriate version for your platform
  - pytorch>=2.0.0
  - torchvision>=0.15.0
  # For NVIDIA GPU: also install pytorch-cuda from the pytorch channel
  # - pytorch-cuda=12.4
  - pip:
    # PyQt6 wheels >=6.8 fail to import on Windows ("DLL load failed while
    # importing QtCore: The specified procedure could not be found"); pin
    # Windows to the last known-good release. Other platforms track latest 6.4+.
    - PyQt6>=6.4.0 ; sys_platform != "win32"
    - PyQt6==6.7.1 ; sys_platform == "win32"
    - PyQt6-Qt6==6.7.1 ; sys_platform == "win32"
    - opencv-python>=4.7.0
    - websockets>=12.0
    - PyOpenGL>=3.1.0
    - tensorstore>=0.1.45
    - zarr>=3.0.0
    - pyqtgraph>=0.13.0
    - imagecodecs>=2023.1.0
